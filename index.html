<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Simple TodoList</title>
    <link rel="stylesheet" href="./src/output.css" />
    <script src="./script.js" defer></script>
  </head>
  <body
    class="bg-[#d6dceb] flex flex-col items-center px-3 justify-center min-h-screen"
  >
    <div
      class="rounded-lg w-full max-w-100 bg-white shadow-[0_0_5px_rgba(0,0,0,0.1)] overflow-hidden"
    >
      <div id="container" class="flex flex-col p-4 gap-2">
        <!-- === 1. HEADER === -->
        <header class="flex flex-col justify-between">
          <div class="flex justify-between">
            <h1 class="text-2xl font-semibold mb-3 md:mb-5 md:text-3xl">
              Simple ToDo List
            </h1>
          </div>
          <div class="flex justify-between items-end gap-10">
            <div
              class="p-2 md:p-3 text-white bg-[#3F9CA1] shadow-[0_0_2px_#3F9CA1] rounded-lg flex flex-col md:gap-1"
            >
              <p id="clock" class="text-2xl md:text-3xl"></p>
              <p id="date" class="text-sm md:text-base">Tuesday, 8 July 2025</p>
            </div>
            <p
              class="flex justify-center items-center text-xs md:text-sm rounded-full gap-1"
            >
              <span
                class="flex justify-center items-center rounded-full bg-[#3F9CA1] size-7 text-white"
                >5</span
              >
              <span class="py-1.5">Task Left</span>
            </p>
          </div>
        </header>

        <!-- === 2. MAIN === -->
        <main class="flex flex-col gap-6">
          <!-- 2.1 Form -->
          <div class="flex flex-col gap-1">
            <p id="error-text" class="ml-2 text-red-500 invisible">
              Todo cannot be empty
            </p>
            <div class="flex justify-between gap-2">
              <input
                id="input-todo"
                type="text"
                placeholder="Add new task..."
                class="w-full rounded-2xl border-2 border-[#3F9CA1] pl-3 md:py-2.5 md:rounded-3xl focus:outline-none focus:shadow-[0_0_5px_#3F9CA1]"
              />
              <button
                id="todo-add-button"
                class="flex min-w-25 text-sm items-center justify-center gap-1 p-2 rounded-lg bg-[#3F9CA1] text-white cursor-pointer"
              >
                <svg
                  xmlns="http://www.w3.org/2000/svg"
                  fill="none"
                  viewBox="0 0 24 24"
                  stroke-width="1.5"
                  stroke="currentColor"
                  class="size-5"
                >
                  <path
                    stroke-linecap="round"
                    stroke-linejoin="round"
                    d="M12 4.5v15m7.5-7.5h-15"
                  />
                </svg>
                Add Task
              </button>
            </div>
          </div>

          <!-- 2.2 Todo List -->
          <section id="todo-list">
            <ul id="todo-container" class="flex flex-col gap-4">
              <!--  -->
            </ul>
          </section>
        </main>
      </div>
      <footer class="text-center p-2 bg-[#EEF2F4]">
        &copy 2026 Created for WPH Challenge 5
      </footer>
    </div>
  </body>
</html>
